name: scrape-taipower-wind

# 放置位置：.github/workflows/scrape.yml
on:
  schedule:
    # 每 15 分鐘，但刻意錯開 :00/:15/:30/:45 尖峰整點(全球最壅塞、最常被略過的時段)。
    # 偏移到 :03/:18/:33/:48 可大幅降低 GitHub 排程被延遲或跳過的機率。
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch: {}       # 允許在 Actions 頁面手動觸發

permissions:
  contents: write             # 需要寫入權限才能把 json commit 回 repo

concurrency:
  group: scrape-wind
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run scraper
        run: python taipower_wind_scraper.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wind_realtime.json wind_history.json
          git diff --staged --quiet || git commit -m "chore: update wind data $(date -u +%FT%TZ)"
          git push
