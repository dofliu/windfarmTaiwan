name: scrape-taipower-wind

# 放置位置：.github/workflows/scrape.yml
on:
  schedule:
    - cron: "*/15 * * * *"   # 每 15 分鐘（GitHub 排程實際可能延遲數分鐘，且高負載時偶爾略過）
  workflow_dispatch: {}       # 允許在 Actions 頁面手動觸發

permissions:
  contents: write             # 需要寫入權限才能把 json commit 回 repo

concurrency:
  group: scrape-wind
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run scraper
        run: python taipower_wind_scraper.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wind_realtime.json
          git diff --staged --quiet || git commit -m "chore: update wind data $(date -u +%FT%TZ)"
          git push
