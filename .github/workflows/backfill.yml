name: backfill-taipower-wind-history

# 每日以政府開放資料集 37331「台灣電力公司_各機組過去發電量」回填
# wind_history.json 的缺口(GitHub Actions 排程常被延遲/跳過，即時抓取會漏點)。
on:
  schedule:
    - cron: "23 19 * * *"     # 每日 19:23 UTC = 台北 03:23(離峰，排程較不易被跳過)
  workflow_dispatch:          # 允許手動觸發(首次回填請由此執行一次)
    inputs:
      dry_run:
        description: "只驗證抓取與解析，不寫檔不 commit"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: scrape-wind          # 與 scrape.yml 同組：與即時抓取序列化，避免互相蓋寫 history
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run backfill
        # BACKFILL_URL(選填 secret)：37331 資源網址若無法由 metadata API 解析時的手動指定值
        env:
          BACKFILL_URL: ${{ secrets.BACKFILL_URL }}
        run: python backfill_history.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wind_history.json
          git diff --staged --quiet || git commit -m "chore: backfill wind history $(date -u +%FT%TZ)"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push
