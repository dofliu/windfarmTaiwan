<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風電風情 · 台灣風力發電即時資訊</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --sea-0:#06212e;--sea-1:#0a2a3a;--sea-2:#0e3547;--sea-3:#13455c;--line:#1d5571;
    --foam:#e9f5f4;--mist:#9fc3cc;--mist-dim:#6f9aa6;
    --gen:#34e0ad;--gen-deep:#0fae84;--sky:#56c2e8;--amber:#f4a64d;--slate:#5b7e8a;
    --tpc:#56c2e8;--ppa:#f4a64d;--shadow:rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 78% -8%,#11405455 0%,transparent 60%),
      radial-gradient(900px 500px at 8% 108%,#0c3a4f55 0%,transparent 55%),var(--sea-1);
    color:var(--foam);overflow:hidden}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  #app{display:flex;flex-direction:column;height:100vh}

  header{flex:0 0 auto;display:flex;align-items:center;gap:18px;padding:13px 22px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0c3142,#0a2a3a);
    box-shadow:0 6px 22px -10px var(--shadow);z-index:600}
  .brand{display:flex;align-items:baseline;gap:11px;min-width:max-content}
  .brand h1{font-size:24px;font-weight:900;letter-spacing:.16em;
    background:linear-gradient(92deg,var(--foam),var(--sky));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .en{font-size:10.5px;letter-spacing:.3em;color:var(--mist-dim);text-transform:uppercase}
  .ticker{display:flex;flex:1;justify-content:center;overflow:hidden}
  .stat{padding:1px 22px;text-align:center;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .k{font-size:10px;letter-spacing:.16em;color:var(--mist-dim);margin-bottom:3px}
  .stat .v{font-size:22px;font-weight:800;line-height:1}
  .stat .v small{font-size:11.5px;font-weight:600;color:var(--mist);margin-left:3px}
  .stat .v.green{color:var(--gen)}.stat .v.sky{color:var(--sky)}
  .feed{display:flex;align-items:center;gap:8px;min-width:max-content;font-size:11px;color:var(--mist)}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .dot.live{background:var(--gen);animation:pulse 2.2s infinite}
  .dot.sim{background:var(--amber)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,224,173,.6)}70%{box-shadow:0 0 0 8px rgba(52,224,173,0)}100%{box-shadow:0 0 0 0 rgba(52,224,173,0)}}
  .seg{display:flex;background:var(--sea-0);border:1px solid var(--line);border-radius:10px;overflow:hidden;min-width:max-content}
  .seg button{background:transparent;border:none;color:var(--mist);font-family:inherit;font-size:13px;font-weight:700;
    padding:9px 15px;cursor:pointer;transition:.18s}
  .seg button.on{background:linear-gradient(180deg,var(--sea-3),var(--sea-2));color:var(--foam)}
  .seg button:hover:not(.on){color:var(--foam)}

  main{flex:1 1 auto;position:relative;overflow:hidden}
  .view{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .35s}
  .view.on{opacity:1;pointer-events:auto}
  #dash{overflow-y:auto;padding:16px 22px 40px}

  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .sort{display:flex;gap:6px;font-size:12px;color:var(--mist-dim);align-items:center;flex-wrap:wrap}
  .sort button{background:var(--sea-2);border:1px solid var(--line);color:var(--mist);
    border-radius:7px;padding:6px 11px;font-family:inherit;font-size:12px;cursor:pointer;transition:.15s}
  .sort button.on{border-color:var(--sky);color:var(--foam)}
  .filt{display:flex;gap:6px;font-size:12px;color:var(--mist-dim);align-items:center;margin-left:auto;flex-wrap:wrap}
  .chip{background:var(--sea-2);border:1px solid var(--line);color:var(--mist);
    border-radius:20px;padding:5px 12px;font-family:inherit;font-size:12px;cursor:pointer;transition:.15s}
  .chip.on{border-color:var(--sky);color:var(--foam);background:var(--sea-3)}

  .grouphead{display:flex;align-items:center;gap:11px;margin:20px 0 11px}
  .grouphead .tag{font-size:10.5px;font-weight:800;letter-spacing:.05em;padding:3px 9px;border-radius:6px;border:1px solid}
  .grouphead .tag.tpc{color:var(--tpc);border-color:#1f5c74;background:#0a3344}
  .grouphead .tag.ppa{color:var(--ppa);border-color:#6b4a22;background:#3a2a14}
  .grouphead h2{font-size:15.5px;font-weight:800;letter-spacing:.05em}
  .grouphead .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .grouphead .sum{font-size:12px;color:var(--mist);font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .card{position:relative;display:flex;gap:12px;background:linear-gradient(160deg,var(--sea-2),var(--sea-1));
    border:1px solid var(--line);border-radius:13px;padding:12px 13px;cursor:pointer;overflow:hidden;
    transition:transform .18s,border-color .18s,box-shadow .18s}
  .card:hover{transform:translateY(-3px);border-color:var(--sky);box-shadow:0 14px 30px -16px #000}
  .card:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
  .card.pending{opacity:.72}
  .col{position:relative;flex:0 0 26px;width:26px;border-radius:7px;background:var(--sea-0);border:1px solid var(--line);overflow:hidden}
  .col .fill{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,var(--gen),var(--gen-deep));transition:height 1.1s cubic-bezier(.4,1.2,.5,1)}
  .col .fill::before{content:"";position:absolute;left:-50%;width:200%;height:12px;top:-6px;
    background:radial-gradient(circle,rgba(255,255,255,.5) 0 38%,transparent 60%);opacity:.3;animation:wave 4s linear infinite}
  @keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(25%)}}
  .col .pct{position:absolute;left:0;right:0;bottom:3px;text-align:center;font-size:9px;font-weight:800;color:#04201a}
  .cbody{flex:1;min-width:0}
  .cname{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cdev{font-size:10.5px;color:var(--mist-dim);margin:2px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cmw{display:flex;align-items:baseline;gap:5px}
  .cmw .big{font-size:21px;font-weight:800;line-height:1}
  .cmw .cap{font-size:11px;color:var(--mist)}
  .cmeta{display:flex;align-items:center;gap:6px;margin-top:7px;font-size:10.5px;color:var(--mist);flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid}
  .badge.run{color:var(--gen);border-color:#1b6b56;background:#0c3a30}
  .badge.dev{color:var(--slate);border-color:#33505b;background:#0d2d39}
  .badge.agg{color:var(--mist);border-color:#33505b;background:#0d2d39}

  #map{position:absolute;inset:0;background:var(--sea-0)}
  .leaflet-popup-content-wrapper{background:#0c2e3d;color:var(--foam);border:1px solid var(--line);border-radius:12px}
  .leaflet-popup-tip{background:#0c2e3d;border:1px solid var(--line)}
  .leaflet-popup-content{margin:13px 15px;font-family:inherit}
  .pop h3{font-size:15px;font-weight:800;margin-bottom:7px}
  .pop .row{display:flex;justify-content:space-between;gap:18px;font-size:12px;margin:3px 0;color:var(--mist)}
  .pop .row b{color:var(--foam);font-weight:700}
  .pop .pbar{height:6px;border-radius:4px;background:var(--sea-0);margin:8px 0 4px;overflow:hidden}
  .pop .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gen-deep),var(--gen))}
  .pop button{margin-top:9px;width:100%;background:var(--sky);color:#04222e;border:none;border-radius:8px;
    padding:7px;font-family:inherit;font-weight:800;font-size:12px;cursor:pointer}
  .maplegend{position:absolute;right:14px;bottom:22px;z-index:500;background:#0c2e3decf;backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:11px;color:var(--mist)}
  .maplegend .ttl{font-weight:800;color:var(--foam);margin-bottom:8px;letter-spacing:.06em}
  .maplegend .li{display:flex;align-items:center;gap:8px;margin:5px 0}
  .maplegend .sw{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
  .maphint{position:absolute;left:14px;top:14px;z-index:500;font-size:11.5px;color:var(--mist);
    background:#0c2e3dcc;border:1px solid var(--line);border-radius:9px;padding:7px 12px;max-width:60vw}

  #scrim{position:absolute;inset:0;background:#02141bbb;opacity:0;pointer-events:none;transition:.3s;z-index:900}
  #scrim.on{opacity:1;pointer-events:auto}
  #drawer{position:absolute;top:0;right:0;height:100%;width:430px;max-width:92vw;z-index:1000;
    background:linear-gradient(165deg,var(--sea-2),var(--sea-1));border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .34s cubic-bezier(.4,.9,.3,1);display:flex;flex-direction:column;
    box-shadow:-20px 0 50px -20px #000}
  #drawer.on{transform:translateX(0)}
  .dhead{padding:20px 22px 16px;border-bottom:1px solid var(--line);position:relative}
  .dhead .close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--mist);font-size:24px;cursor:pointer;line-height:1}
  .dhead .close:hover{color:var(--foam)}
  .dhead h2{font-size:21px;font-weight:900;padding-right:30px}
  .dhead .sub{font-size:12.5px;color:var(--mist-dim);margin-top:5px}
  .dbody{flex:1;overflow-y:auto;padding:20px 22px 40px}
  .liveblock{background:var(--sea-0);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:18px}
  .liveblock .top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
  .liveblock .top .lab{font-size:11px;letter-spacing:.14em;color:var(--mist-dim)}
  .liveblock .top .out{font-size:33px;font-weight:900;line-height:.9}
  .liveblock .top .out small{font-size:14px;font-weight:600;color:var(--mist);margin-left:4px}
  .liveblock .ratio{text-align:right}.liveblock .ratio .v{font-size:25px;font-weight:800}
  .liveblock .ratio .l{font-size:10.5px;color:var(--mist-dim);letter-spacing:.1em}
  .spark{width:100%;height:46px;display:block}
  .specs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;margin-bottom:18px}
  .spec{background:var(--sea-2);padding:11px 13px}
  .spec .l{font-size:10.5px;color:var(--mist-dim);margin-bottom:4px}
  .spec .v{font-size:14.5px;font-weight:700}
  .spec.wide{grid-column:1/3}
  .timeline h3{font-size:13px;letter-spacing:.08em;color:var(--mist);margin-bottom:12px}
  .tl{position:relative;padding-left:22px}
  .tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tlitem{position:relative;margin-bottom:13px}
  .tlitem::before{content:"";position:absolute;left:-21px;top:3px;width:10px;height:10px;border-radius:50%;
    background:var(--sea-1);border:2px solid var(--sky)}
  .tlitem.done::before{background:var(--gen);border-color:var(--gen)}
  .tlitem .d{font-size:11px;color:var(--sky);font-weight:700}
  .tlitem .t{font-size:13px;margin-top:2px}
  .note{font-size:11.5px;color:var(--mist-dim);line-height:1.7;border-top:1px solid var(--line);padding-top:14px;margin-top:8px}

  footer{flex:0 0 auto;padding:7px 22px;border-top:1px solid var(--line);font-size:10.5px;color:var(--mist-dim);
    display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
  @media (max-width:880px){.ticker{display:none}.brand h1{font-size:19px}header{gap:10px;padding:11px 14px;flex-wrap:wrap}#dash{padding:14px}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>風電風情</h1><span class="en">Taiwan Wind Watch</span></div>
    <div class="ticker" id="ticker"></div>
    <div class="feed"><span class="dot sim" id="feeddot"></span><span id="feedtxt">載入中…</span></div>
    <div class="seg" id="seg"><button class="on" data-v="dash">風情儀表</button><button data-v="map">衛星地圖</button></div>
  </header>
  <main>
    <section class="view on" id="dash">
      <div class="toolbar">
        <div class="sort" id="sort"><span>排序</span>
          <button class="on" data-s="output">即時出力</button>
          <button data-s="ratio">利用率</button>
          <button data-s="cap">裝置容量</button>
          <button data-s="name">名稱</button>
        </div>
        <div class="filt" id="filt">
          <span class="chip on" data-f="all">全部</span>
          <span class="chip" data-f="offshore">離岸</span>
          <span class="chip" data-f="onshore">陸域</span>
        </div>
      </div>
      <div id="groups"></div>
    </section>
    <section class="view" id="map-view">
      <div id="map"></div>
      <div class="maphint">點選風場圖示查看即時出力與專案資訊 · 共 30 個機組 / 風場</div>
      <div class="maplegend">
        <div class="ttl">圖示說明</div>
        <div class="li"><span class="sw" style="background:var(--gen)"></span>利用率高（≥45%）</div>
        <div class="li"><span class="sw" style="background:var(--sky)"></span>利用率中（20–45%）</div>
        <div class="li"><span class="sw" style="background:var(--amber)"></span>利用率低（&lt;20%）</div>
        <div class="li"><span class="sw" style="background:var(--slate)"></span>開發中／未列容量</div>
        <div class="li" style="margin-top:8px;color:var(--mist-dim)">圈圈大小 ＝ 裝置容量</div>
      </div>
    </section>
  </main>
  <footer>
    <span>機組分類、名稱與容量：依台電「各機組發電量」（genary.json）四類揭露整理 · 容量／出力以台電公布為準</span>
    <span id="datamode"></span>
  </footer>
</div>
<div id="scrim"></div>
<aside id="drawer" role="dialog" aria-modal="true">
  <div class="dhead"><button class="close" id="dclose" aria-label="關閉">×</button>
    <h2 id="dname"></h2><div class="sub" id="dsub"></div></div>
  <div class="dbody" id="dbody"></div>
</aside>

<script>
/* ===== 風電風情 — 對齊台電 genary.json 風力四類三十機組 =====

   未連線時：以 6/29 16:13 台電實際快照為基準，做模擬浮動（已明確標示，非真實即時）。 */
const DATA_ENDPOINT="./wind_realtime.json";   // 例如 "https://your-host/wind_realtime.json"

/* tp=台電 genary 機組名稱(用於即時對應) ; cap=裝置容量MW(null=台電未列,註10)

const GROUPS=[
 {key:"off-ppa",label:"離岸風力 · 購電",tag:"ppa",cls:"off"},
 {key:"off-tpc",label:"離岸風力 · 台電自有",tag:"tpc",cls:"off"},

 {key:"on-tpc", label:"陸域風力 · 台電自有",tag:"tpc",cls:"on"},
];
const isOffshore=f=>f.grp.startsWith("off");

let LIVE=false,lastUpdate=null,srcTime=null,sortKey="output",filt="all";
let HIST={points:[]};                          // 真實滾動歷史(scraper 累積，每 15 分一筆)
const HIST_ENDPOINT="./wind_history.json";
const RT={};
// 台電 opendata 的「資料時間」(source_time，台北時間無時區) → 顯示用字串
function fmtSrc(s){if(!s)return"";const d=new Date(s);if(isNaN(d))return s;
  const p=n=>String(n).padStart(2,"0");
  return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function seeded(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return((h>>>0)%1000)/1000}
function windDrift(){const t=Date.now()/1000;return 1+0.35*Math.sin(t/360)+0.12*Math.sin(t/64);}
function simOutput(f){
  const drift=windDrift();
  const noise=1+0.10*Math.sin(Date.now()/2200+seeded(f.tp)*7);
  if(f.pending){                       // 註10 試運轉機組：會發電，但無裝置容量上限可夾
    let v=f.snap*drift*noise;
    return +Math.max(0,Math.min(f.snap*1.45,v)).toFixed(1);
  }
  const cap=f.cap||0;
  let v=f.snap*drift*noise;
  v=Math.max(0,Math.min(cap,v));
  return +v.toFixed(1);
}
function refresh(){if(LIVE)return;            // 即時模式：不跑模擬，保留台電真實值不被覆蓋
  FARMS.forEach(f=>RT[f.id]=simOutput(f));lastUpdate=new Date();paint();}
async function tryLive(){
  if(!DATA_ENDPOINT){setFeed(false);return;}
  try{const r=await fetch(DATA_ENDPOINT,{cache:"no-store"});const j=await r.json();
    if(j&&j.farms){FARMS.forEach(f=>{if(j.farms[f.id]!=null)RT[f.id]=j.farms[f.id]});
      srcTime=j.source_time||null;
      lastUpdate=j.updated?new Date(j.updated):new Date();setFeed(true);paint();return;}
    setFeed(false);}catch(e){setFeed(false)}
}
async function tryHistory(){                    // 抓真實滾動歷史(供出力趨勢線)
  try{const r=await fetch(HIST_ENDPOINT,{cache:"no-store"});const j=await r.json();
    if(j&&Array.isArray(j.points))HIST=j;}catch(e){/* 尚無歷史檔時靜默忽略 */}
}
function setFeed(live){
  LIVE=live;const dot=document.getElementById("feeddot"),txt=document.getElementById("feedtxt"),dm=document.getElementById("datamode");
  if(live){dot.className="dot live";
    txt.textContent=srcTime?`即時資料 · 台電更新 ${fmtSrc(srcTime)}`:"即時資料 · 每 10 分鐘更新";
    dm.textContent=srcTime?`● 即時：已連線後端端點 · 台電資料時間 ${fmtSrc(srcTime)}`:"● 即時：已連線後端端點";}
  else{dot.className="dot sim";txt.textContent="模擬浮動（基準：台電開放資料 6/15 17:30 快照）";
    dm.textContent="◐ 即時：模擬中 · 設定 DATA_ENDPOINT 後切換為真實資料";}
}
const capOf=f=>f.cap||f.planned||0;
const sizeMW=f=>{const c=(typeof f.cap==="number"?f.cap:0)||(typeof f.planned==="number"?f.planned:0);
  return c>0?c:Math.max(20,(f.snap||0)*1.2);};   // 註10無容量者用出力推估marker大小
const ratioOf=f=>{const c=f.cap||0;return c>0?RT[f.id]/c:0;};
function hexColor(f){if(f.pending||!f.cap)return"#5b7e8a";const r=ratioOf(f);
  return r>=0.45?"#34e0ad":r>=0.20?"#56c2e8":"#f4a64d";}
function cssColor(f){if(f.pending||!f.cap)return"var(--slate)";const r=ratioOf(f);
  return r>=0.45?"var(--gen)":r>=0.20?"var(--sky)":"var(--amber)";}

function paint(){paintTicker();paintGroups();updateMarkers();}
function paintTicker(){
  const total=FARMS.reduce((s,f)=>s+RT[f.id],0);
  const cap=FARMS.reduce((s,f)=>s+(f.cap||0),0);
  const co2=(total*0.495/1000).toFixed(1);
  const op=FARMS.filter(f=>!f.pending).length;
  document.getElementById("ticker").innerHTML=`
    <div class="stat"><div class="k">全台風電即時出力</div><div class="v green num">${Math.round(total).toLocaleString()}<small>MW</small></div></div>
    <div class="stat"><div class="k">總裝置容量</div><div class="v num">${Math.round(cap).toLocaleString()}<small>MW</small></div></div>
    <div class="stat"><div class="k">整體利用率</div><div class="v sky num">${(total/cap*100).toFixed(1)}<small>%</small></div></div>
    <div class="stat"><div class="k">每小時減碳（示意）</div><div class="v num">${co2}<small>噸</small></div></div>
    <div class="stat"><div class="k">機組／風場</div><div class="v num">${op}<small>／${FARMS.length}</small></div></div>`;
}
function sortFarms(a){const c=[...a];
  if(sortKey==="output")c.sort((x,y)=>RT[y.id]-RT[x.id]);
  else if(sortKey==="ratio")c.sort((x,y)=>ratioOf(y)-ratioOf(x));
  else if(sortKey==="cap")c.sort((x,y)=>sizeMW(y)-sizeMW(x));
  else c.sort((x,y)=>x.name.localeCompare(y.name,"zh-Hant"));
  return c;}
function cardHTML(f){
  const has=f.cap&&!f.pending;
  const pct=has?Math.max(0,Math.min(100,ratioOf(f)*100)):0;
  const capTxt=f.cap?`/ ${f.cap} MW`:(f.planned&&f.planned!=="—"?`/ 規劃 ${f.planned}`:"/ 未列容量");
  const badge=f.pending?`<span class="badge dev">試運轉</span>`:(f.agg?`<span class="badge agg">彙總</span>`:`<span class="badge run">商轉</span>`);
  return `<div class="card${f.pending?" pending":""}" tabindex="0" data-id="${f.id}" role="button" aria-label="${f.name}">
    <div class="col"><div class="fill" style="height:${pct}%;background:linear-gradient(180deg,${cssColor(f)},var(--gen-deep))"></div>
      <div class="pct">${has?pct.toFixed(0)+"%":""}</div></div>
    <div class="cbody">
      <div class="cname">${f.name}</div>
      <div class="cdev">${f.dev}</div>
      <div class="cmw"><span class="big num" style="color:${cssColor(f)}">${RT[f.id].toFixed(1)}</span>
        <span class="cap num">${capTxt}</span></div>
      <div class="cmeta">${badge}</div>
    </div></div>`;
}
function paintGroups(){
  const wrap=document.getElementById("groups");let html="";
  GROUPS.forEach(g=>{
    if(filt==="offshore"&&g.cls!=="off")return;
    if(filt==="onshore"&&g.cls!=="on")return;
    let list=sortFarms(FARMS.filter(f=>f.grp===g.key));
    const out=list.reduce((s,f)=>s+RT[f.id],0),cap=list.reduce((s,f)=>s+(f.cap||0),0);
    html+=`<div class="grouphead"><span class="tag ${g.tag}">${g.tag==="tpc"?"台電自有":"購電"}</span>
      <h2>${g.label}</h2><div class="rule"></div>
      <div class="sum num">${out.toFixed(1)} / ${Math.round(cap).toLocaleString()} MW · ${cap>0?(out/cap*100).toFixed(0):0}%</div></div>
      <div class="grid">${list.map(cardHTML).join("")}</div>`;
  });
  wrap.innerHTML=html;
  wrap.querySelectorAll(".card").forEach(c=>{c.onclick=()=>openDrawer(c.dataset.id);
    c.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openDrawer(c.dataset.id)}};});
}
const SPARK_WIN=24;                            // 最近 24 筆(每 15 分一筆 ≈ 6 小時)
function sparkSeries(f){                        // 取該風場最近 N 筆真實出力
  return HIST.points.slice(-SPARK_WIN)
    .filter(p=>p&&p.farms&&typeof p.farms[f.id]==="number")
    .map(p=>({t:p.t,v:p.farms[f.id]}));
}
function sparkSVG(f){
  const s=sparkSeries(f),w=380,h=46;
  if(s.length<2)                                // 歷史不足兩筆，畫不出真實趨勢
    return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <line x1="0" y1="${h-2}" x2="${w}" y2="${h-2}" stroke="${hexColor(f)}" stroke-width="2" opacity=".4"/></svg>`;
  const vals=s.map(p=>p.v),max=Math.max(...vals,(f.cap||1)*0.1,0.5);
  const d=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-v/max*h*0.9-2).toFixed(1)}`).join(" ");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${d}" fill="none" stroke="${hexColor(f)}" stroke-width="2"/>
    <polyline points="0,${h} ${d} ${w},${h}" fill="${hexColor(f)}" opacity="0.12" stroke="none"/></svg>`;
}
function sparkLabel(f){
  const s=sparkSeries(f);
  if(s.length<2)return `出力趨勢累積中（目前 ${s.length} 筆 · 每 15 分鐘一筆）`;
  const a=fmtSrc(s[0].t),b=fmtSrc(s[s.length-1].t).split(" ").pop();
  return `${a}–${b} 實際出力 · 每 15 分鐘一筆（台電資料）`;
}
function openDrawer(id){
  const f=FARMS.find(x=>x.id===id);if(!f)return;
  document.getElementById("dname").textContent=f.name;
  document.getElementById("dsub").textContent=`台電機組名稱：${f.tp} · ${f.dev}`;
  const r=ratioOf(f)*100,off=isOffshore(f);
  const stxt=f.pending?"試運轉（台電未列裝置容量·註10）":(f.agg?"彙總":"商轉中");
  const capTxt=f.cap?`${f.cap} MW`:(f.planned&&f.planned!=="—"?`規劃 ${f.planned} MW`:"台電未列（註10）");
  const specs=[
    ["裝置容量",capTxt],["狀態",stxt],
    ...(off?[["風機數量",f.turbines||"—"],["單機容量",f.unit||"—"],
            ["風機型號",f.model||"—",true],["水深",f.depth||"—"],["離岸距離",f.dist||"—"],
            ["年發電量",f.annual||"—"],["可供應",f.homes||"—"]]
          :[["地點",f.site||"—",true],["機型",f.model||"—"],["單機容量",f.unit||"—"]]),
  ];
  document.getElementById("dbody").innerHTML=`
    <div class="liveblock">
      <div class="top">
        <div><div class="lab">即時出力 ${LIVE?"":"（模擬·基準快照）"}</div>
          <div class="out num" style="color:${cssColor(f)}">${RT[f.id].toFixed(1)}<small>MW</small></div></div>
        <div class="ratio"><div class="v num" style="color:${cssColor(f)}">${f.cap?r.toFixed(0)+"%":"—"}</div><div class="l">利用率</div></div>
      </div>${sparkSVG(f)}
      <div class="lab" style="margin-top:6px;color:var(--mist-dim)">${sparkLabel(f)}</div></div>
    <div class="specs">${specs.map(s=>`<div class="spec${s[2]?" wide":""}"><div class="l">${s[0]}</div>
      <div class="v" style="font-size:${s[2]?"13px":"14.5px"}">${s[1]}</div></div>`).join("")}</div>
    <div class="timeline"><h3>開發與營運歷程</h3>
      <div class="tl">${f.tl.map(t=>`<div class="tlitem ${t[2]}"><div class="d">${t[0]}</div><div class="t">${t[1]}</div></div>`).join("")}</div></div>
    ${f.note?`<div class="note">${f.note}</div>`:""}`;
  document.getElementById("scrim").classList.add("on");
  document.getElementById("drawer").classList.add("on");
}
function closeDrawer(){document.getElementById("scrim").classList.remove("on");document.getElementById("drawer").classList.remove("on");}
document.getElementById("dclose").onclick=closeDrawer;
document.getElementById("scrim").onclick=closeDrawer;
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});

let map,markers={};
document.getElementById("seg").onclick=e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x===b));
  const v=b.dataset.v;
  document.getElementById("dash").classList.toggle("on",v==="dash");
  document.getElementById("map-view").classList.toggle("on",v==="map");
  if(v==="map"){initMap();setTimeout(()=>map.invalidateSize(),60);}};
document.getElementById("sort").onclick=e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#sort button").forEach(x=>x.classList.toggle("on",x===b));sortKey=b.dataset.s;paintGroups();};
document.getElementById("filt").onclick=e=>{const b=e.target.closest(".chip");if(!b)return;
  document.querySelectorAll("#filt .chip").forEach(x=>x.classList.toggle("on",x===b));filt=b.dataset.f;paintGroups();};

function initMap(){
  if(map)return;
  map=L.map("map",{zoomControl:true}).setView([24.1,120.3],8);
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {maxZoom:18,attribution:"Tiles © Esri"}).addTo(map);
  L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
    {maxZoom:18,opacity:.9}).addTo(map);
  FARMS.forEach(f=>{
    const m=L.circleMarker([f.lat,f.lng],{radius:Math.max(6,Math.sqrt(sizeMW(f))*0.85),
      color:"#fff",weight:1.1,fillColor:hexColor(f),fillOpacity:.82}).addTo(map);
    m.bindPopup(popHTML(f),{maxWidth:280});
    m.on("popupopen",()=>{const b=document.querySelector(`#pop-${f.id}`);if(b)b.onclick=()=>{map.closePopup();openDrawer(f.id);};});
    markers[f.id]=m;});
}
function popHTML(f){
  const r=f.cap?Math.max(0,Math.min(100,ratioOf(f)*100)):0;
  const capTxt=f.cap?`${f.cap} MW`:(f.planned&&f.planned!=="—"?`規劃 ${f.planned} MW`:"未列容量");
  return `<div class="pop"><h3>${f.name}</h3>
    <div class="row"><span>台電機組</span><b>${f.tp}</b></div>
    <div class="row"><span>即時出力</span><b class="num" style="color:${hexColor(f)}">${RT[f.id].toFixed(1)} MW</b></div>
    <div class="row"><span>裝置容量</span><b class="num">${capTxt}</b></div>
    ${f.cap?`<div class="row"><span>利用率</span><b class="num">${r.toFixed(0)}%</b></div>
    <div class="pbar"><i style="width:${r}%"></i></div>`:""}
    <div class="row"><span>${f.dev}</span></div>
    <button id="pop-${f.id}">查看專案資訊 →</button></div>`;
}
function updateMarkers(){if(!map)return;FARMS.forEach(f=>{const m=markers[f.id];if(m){m.setStyle({fillColor:hexColor(f)});
  if(m.isPopupOpen())m.setPopupContent(popHTML(f));}});}

refresh();tryLive();tryHistory();
setInterval(refresh,15000);
if(DATA_ENDPOINT){setInterval(tryLive,600000);setInterval(tryHistory,600000);}
</script>
</body>
